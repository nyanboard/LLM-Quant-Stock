# 量化筛选规则配置
# 注意：pre_screen 预筛段落已移除，过滤逻辑改由 LLM 分析阶段按需 SQL 查询完成
# filters: LLM之后的技术筛选规则
#   required: 必须满足（AND）
#   bonus: 加分项
#   veto: 一票否决

filters:
  required:
    - condition: "rsi_14 < 70"
    - condition: "volume_ratio > 0.8"
    - condition: "ma5 > ma20 or cross_up(ma5, ma20)"

  bonus:
    - pattern: hammer
      score: +2
    - pattern: bullish_engulfing
      score: +2
    - condition: "macd_golden_cross == true"
      score: +3
    - condition: "rsi_14 < 30"
      score: +1
    - condition: "money_flow_net > 0"
      score: +2

  veto:
    - condition: "rsi_14 > 85"
    - condition: "limit_down == true"
