# 量化筛选规则配置
# pre_screen: LLM之前的预筛规则（粗筛，减少LLM调用量）
# filters: LLM之后的技术筛选规则
#   required: 必须满足（AND）
#   bonus: 加分项
#   veto: 一票否决

pre_screen:
  # 上市状态
  exclude_st: true              # 排除 ST/*ST
  exclude_suspended: true       # 排除停牌
  min_list_days: 250            # 上市至少250个交易日（约1年）

  # 市值（亿元）
  market_cap:
    min: 50
    max: 5000

  # 流动性
  liquidity:
    min_avg_amount: 3000        # 日均成交额 > 3000万
    min_turnover_rate: 0.5      # 换手率 > 0.5%

  # 估值
  valuation:
    pe_min: 0                   # PE > 0（排除亏损）
    pe_max: 100                 # PE < 100（排除泡沫）
    pb_min: 0                   # PB > 0
    pb_max: 20                  # PB < 20

  # 盈利能力
  profitability:
    min_roe: 3                  # 最近一期 ROE > 3%
    revenue_positive: true      # 营收为正

  # 财务健康
  financial_health:
    max_debt_ratio: 80          # 资产负债率 < 80%
    operating_cashflow_positive: true  # 经营现金流为正

  # 价格
  price:
    min: 2                      # 股价 > 2元

  # 涨跌停
  exclude_limit_up: true        # 排除涨停
  exclude_limit_down: true      # 排除跌停

filters:
  required:
    - condition: "rsi_14 < 70"
    - condition: "volume_ratio > 0.8"
    - condition: "ma5 > ma20 or cross_up(ma5, ma20)"

  bonus:
    - pattern: hammer
      score: +2
    - pattern: bullish_engulfing
      score: +2
    - condition: "macd_golden_cross == true"
      score: +3
    - condition: "rsi_14 < 30"
      score: +1
    - condition: "money_flow_net > 0"
      score: +2

  veto:
    - condition: "rsi_14 > 85"
    - condition: "limit_down == true"
