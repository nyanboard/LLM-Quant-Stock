# OpenSpec 配置
context: |
  历史隐性约定：
  - 股票代码格式：上层统一使用纯数字，数据层负责格式转换
  - 回测必须使用前复权数据
  - Agent 评分范围固定为 1-10，信心度 0-1
  - 综合评分权重：LLM(40%) + 技术(30%) + 形态(20%) + 资金(10%)
  - 修改这些约定时，必须先检查 docs/architecture/implicit-contracts.md
  - 如果需求触及这些约定，design.md 必须明确影响范围和兼容策略
rules:
  design:
    - 若涉及隐性约定，必须写清楚兼容处理方式
    - 若涉及 Agent 提示词变更，必须说明对选股结果的预期影响
    - 若涉及量化规则变更，必须包含回测对比方案
  tasks:
    - 若涉及隐性约定，必须包含验证步骤
    - 若涉及数据层变更，必须包含数据格式兼容测试
